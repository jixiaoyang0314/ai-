<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>失踪老人识别 - FaceMatch</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* 老人识别主题覆盖 */
        :root {
            --primary: #4f86c6;
            --primary-dark: #3f74b1;
        }
        .brand-name { color: var(--primary); }
        .brand-mark  { color: var(--primary); }
        .nav-login   { background: #5e8fc8; }
        .search-btn  { background: #5e8fc8; }
        .primary-btn { background: #5e8fc8; box-shadow: 0 6px 16px rgba(79,134,198,0.12); }
        .tip-label   { color: var(--primary); }
        .match-badge { color: var(--primary); background: #eef4fb; border-color: rgba(31,94,168,0.2); }
        .gallery-item:hover { border-color: rgba(31,94,168,0.35); }
        .search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,134,198,0.12); }
        .nav-item:hover { color: var(--primary); }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand" aria-label="FaceMatch">
                <div class="brand-mark" aria-hidden="true">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <path d="M14 2C19.2 2 23.8 6.3 23.8 11.6C23.8 18.8 18.8 24.8 14 26C9.2 24.8 4.2 18.8 4.2 11.6C4.2 6.3 8.8 2 14 2Z" stroke="currentColor" stroke-width="2.2"/>
                        <path d="M9.2 13.2L12.6 16.6L18.9 10.3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <div class="brand-name">FaceMatch</div>
                    <div class="brand-sub">失踪老人智能识别系统</div>
                </div>
            </div>

            <nav class="top-nav" aria-label="顶部导航">
                <a href="home.html" class="back-btn">
                    ← 返回选择
                </a>
                <button class="nav-item" type="button">使用帮助</button>
                <button class="nav-item" type="button">联系我们</button>
                <div id="userContainer"></div>
            </nav>
        </div>
    </header>

    <div class="user-menu" id="userMenu">
        <div class="user-menu-item" id="userName"></div>
        <button class="user-menu-item" id="logoutBtn">退出登录</button>
    </div>

    <main class="page">
        <img class="side-face side-face--left"  src="side-images/0d5cdfc5-d9f7-4a7a-8f26-48f88a2f205b.png" alt="" aria-hidden="true">
        <img class="side-face side-face--right" src="side-images/屏幕截图 2026-03-24 235459.png" alt="" aria-hidden="true">

        <section class="hero">
            <div class="hero-center">
                <div class="upload-card">
                    <div class="search-box">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2"/>
                            <path d="M12 12 L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <input type="text" class="search-input" id="searchInput"
                            placeholder="输入老人特征 (如: 70岁，白发，蓝色外套，身高偏矮...)">
                        <button class="search-btn" id="searchBtn" type="button">搜索</button>
                    </div>
                    <div class="search-tips">
                        <span class="tip-label">提示:</span>
                        <span>描述越详细，匹配度越高</span>
                    </div>
                </div>
                <button class="primary-btn" type="button">通过人脸搜索失踪老人</button>
            </div>
        </section>

        <section class="gallery-section">
            <div class="gallery-header">
                <h2 class="gallery-title">失踪老人库</h2>
                <span class="result-count" id="resultCount">显示全部</span>
            </div>
            <div class="gallery" id="gallery"></div>
        </section>

        <section class="social-proof" aria-label="媒体报道">
            <div class="seen-on">AS SEEN ON</div>
            <div class="logos">
                <span class="logo-pill">FOX TODAY</span>
                <span class="logo-pill">USA Watch</span>
                <span class="logo-pill">BENZINGA</span>
                <span class="logo-pill">DailyHerald</span>
            </div>
        </section>

        <section class="testimonial" aria-label="用户评价">
            <div class="quote-mark quote-left" aria-hidden="true">"</div>
            <div class="quote-text">FaceMatch 帮助我们在48小时内找到了走失的老人！</div>
            <div class="quote-mark quote-right" aria-hidden="true">"</div>
            <div class="quote-author">某社区工作人员</div>
        </section>
    </main>

    <!-- 详情弹窗 -->
    <div class="detail-modal" id="detailModal">
        <div class="detail-box">
            <button class="detail-close" id="detailClose" aria-label="关闭">✕</button>
            <img class="detail-img" id="detailImg" src="" alt="">
            <div class="detail-name" id="detailName"></div>
            <div class="detail-match" id="detailMatch"></div>
            <div class="detail-id" id="detailId"></div>
        </div>
    </div>

    <!-- 搜索加载层 -->
    <div class="loading" id="loading" aria-hidden="true">
        <div class="loading-panel">
            <div class="loading-flash-wrap">
                <img class="loading-flash-image" id="loadingFlashImage" src="" alt="搜索预览">
            </div>
            <div class="loading-text">正在识别中...</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-progress-text" id="loadingProgressText">0%</div>
        </div>
    </div>

    <script src="elderly-script.js"></script>
    <script>
        function initUser() {
            const user = JSON.parse(localStorage.getItem('user'));
            const container = document.getElementById('userContainer');
            const userMenu = document.getElementById('userMenu');
            const userName = document.getElementById('userName');
            const logoutBtn = document.getElementById('logoutBtn');
            if (!container) return;
            container.innerHTML = '';

            if (user) {
                const avatar = document.createElement('div');
                avatar.className = 'user-avatar';
                avatar.innerHTML = `<img src="${user.avatar}" alt="${user.username}">`;
                avatar.onclick = (e) => {
                    e.stopPropagation();
                    userMenu.classList.toggle('active');
                };
                container.appendChild(avatar);
                userName.textContent = user.username;
                logoutBtn.onclick = () => {
                    localStorage.removeItem('user');
                    window.location.href = 'login.html';
                };
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.user-avatar') && !e.target.closest('.user-menu')) {
                        userMenu.classList.remove('active');
                    }
                });
            } else {
                const loginBtn = document.createElement('a');
                loginBtn.href = 'login.html';
                loginBtn.className = 'nav-login';
                loginBtn.textContent = '登录';
                container.appendChild(loginBtn);
            }
        }
        document.addEventListener('DOMContentLoaded', initUser);
    </script>
</body>
</html>
